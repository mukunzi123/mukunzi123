<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mukunzi | Premium Video Portal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --card-bg: #11141b;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #05070a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
        
        .netflix-row::-webkit-scrollbar { display: none; }
        .netflix-row { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 20px;
        }
        
        .whatsapp-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .whatsapp-fab:hover {
            transform: translateY(-8px) rotate(8deg);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.3);
        }

        .text-gradient-orange {
            background: linear-gradient(to right, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-blue {
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Video Performance Constraints & Enhancement */
        .video-container-constrained {
            max-height: 65vh;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.5);
            will-change: transform;
        }

        /* Cinematic Processing Simulation */
        .video-high-fidelity {
            filter: contrast(1.08) saturate(1.15) brightness(1.02);
            image-rendering: -webkit-optimize-contrast;
            transition: filter 0.5s ease-in-out;
        }

        .img-lazy-fade {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Noise Reduction Overlays */
        .video-overlay-grain {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            mix-blend-mode: overlay;
            z-index: 5;
        }
    </style>
<script type="importmap">
{

    "react": "https://esm.sh/react@^19.2.4",

    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>

</head>

</body>
</html>
